<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Manda Arolala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Manda Arolala</span>
      <div class="topbar-sep"></div>
      <!-- Onglets de navigation -->
      <div class="tab-nav">
        <button class="tab-btn active" onclick="window.location.href='messages.html'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Messages
          <span class="tab-badge" id="messages-unread-badge" style="display:none">0</span>
        </button>
        <button class="tab-btn" onclick="window.location.href='visites.html'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Visites
          <span class="tab-badge" id="messages-today-badge" style="display:none">0</span>
        </button>
      </div>
    </div>
    <div class="topbar-right">
      <span class="admin-badge" id="admin-name-badge">admin</span>
      <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
    </div>
  </nav>

  <!-- ── MESSAGES ── -->
  <div class="main">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total messages</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Non lus</div>
        <div class="stat-value" id="stat-unread">— <span>nouveau</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ce mois</div>
        <div class="stat-value" id="stat-month">—</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
        <button class="filter-btn" onclick="setFilter('unread', this)">Non lus</button>
        <button class="filter-btn" onclick="setFilter('read', this)">Lus</button>
      </div>
      <div style="display:flex;gap:0.6rem;align-items:center;">
        <input class="search-input" type="text" placeholder="Rechercher…" id="search-input" oninput="renderMessages()" />
        <button class="btn-refresh" onclick="loadMessages()">↺ Actualiser</button>
      </div>
    </div>

    <div class="messages-wrap">
      <div class="messages-header">
        <div></div>
        <div>Nom</div>
        <div class="h-email">Email</div>
        <div class="h-sujet">Sujet</div>
        <div>Date</div>
        <div>Statut</div>
      </div>
      <div id="messages-list">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <!-- ── Modal message ── -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div class="modal-from">
        <div class="modal-avatar" id="modal-avatar">M</div>
        <div>
          <div class="modal-from-name" id="modal-name"></div>
          <div class="modal-from-email" id="modal-email-modal"></div>
        </div>
      </div>
      <div class="modal-sujet" id="modal-sujet"></div>
      <div class="modal-date" id="modal-date"></div>
      <hr class="modal-divider" />
      <div class="modal-message" id="modal-message"></div>
      <div class="modal-actions">
        <button class="btn-mark" id="btn-mark" onclick="toggleLu()">✓ Marquer comme lu</button>
        <button class="btn-delete" onclick="deleteMessage()">✕ Supprimer</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="messages.js"></script>
</body>
</html>
