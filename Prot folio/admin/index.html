<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Manda Arolala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-blob lb1"></div>
  <div class="login-blob lb2"></div>
  <div class="login-card">
    <div class="login-logo">Manda Arolala</div>
    <div class="login-subtitle">Espace administrateur — accès restreint</div>
    <div class="login-error" id="login-error">Identifiants incorrects. Réessayez.</div>
    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" id="inp-username" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="inp-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="btn-login" onclick="handleLogin()">Se connecter</button>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
</body>
</html>
